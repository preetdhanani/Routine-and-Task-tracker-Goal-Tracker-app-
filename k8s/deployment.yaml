apiVersion: apps/v1
kind: Deployment
metadata:
  name: goal-tracker
  labels:
    app: goal-tracker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: goal-tracker
  template:
    metadata:
      labels:
        app: goal-tracker
    spec:
      containers:
        - name: goal-tracker
          image: ghcr.io/preetdhanani/routine-and-task-tracker-goal-tracker-app-:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: goal-tracker-secrets
                  key: supabase-url
                  optional: true
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: goal-tracker-secrets
                  key: supabase-anon-key
                  optional: true
