apiVersion: v1
kind: Service
metadata:
  name: {{ include "goal-tracker.fullname" . }}-service
  labels:
    {{- include "goal-tracker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "goal-tracker.selectorLabels" . | nindent 4 }}
